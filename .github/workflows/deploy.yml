name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # ── Release Please ──────────────────────────────────────────────────────────
  # Opens/updates a versioned release PR on every push to main.
  # When that PR is merged, creates the GitHub Release and sets release_created=true.
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
    steps:
      - id: rp
        uses: googleapis/release-please-action@v4
        with:
          release-type: node

  # ── npm publish ─────────────────────────────────────────────────────────────
  # Runs only when Release Please just created a new GitHub Release.
  # Uses OIDC (Trusted Publisher) — no stored npm token needed.
  npm-publish:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-node@v4.4.0
        with:
          node-version: '22'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci

      # Publish via OIDC Trusted Publisher.
      # Key: do NOT pass registry-url to setup-node — that would cause
      # setup-node to write a .npmrc and export NODE_AUTH_TOKEN (=GITHUB_TOKEN)
      # via $GITHUB_ENV, which npm treats as pre-configured auth and skips the
      # OIDC exchange even when ACTIONS_ID_TOKEN_REQUEST_URL is present.
      # Instead, set the registry manually so there is no auth token at all.
      - uses: actions/setup-node@v4.4.0
        with:
          node-version: '22'

      - run: npm ci

      - name: Publish to npm via OIDC Trusted Publisher
        run: |
          npm config set registry https://registry.npmjs.org/

          # Manually exchange the GitHub OIDC token for a short-lived npm
          # publish token (this is what `npm publish` does internally, but
          # only when there is no pre-configured auth in scope).
          OIDC_TOKEN=$(curl -sf \
            -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=npm" \
            | node -e "process.stdin.resume();let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>console.log(JSON.parse(d).value))")

          NPM_TOKEN=$(curl -sf \
            -X POST \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${OIDC_TOKEN}" \
            "https://registry.npmjs.org/-/npm/v1/tokens/grantee" \
            | node -e "process.stdin.resume();let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>console.log(JSON.parse(d).token))")

          NODE_AUTH_TOKEN="${NPM_TOKEN}" npm publish --provenance --access public

  # ── GitHub Pages ────────────────────────────────────────────────────────────
  # Builds the example site and deploys it to GitHub Pages on every push to main.
  pages:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4.4.0
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Build example site
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          node bin/markdown-graph.js --build ./site --repos \
            vercel/next.js,facebook/react,vitejs/vite

      - uses: actions/configure-pages@v5.0.0
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3.0.1
        with:
          path: ./site

      - id: deployment
        uses: actions/deploy-pages@v4.0.5
