name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # ── Release Please ──────────────────────────────────────────────────────────
  # Opens/updates a versioned release PR on every push to main.
  # When that PR is merged, creates the GitHub Release and sets release_created=true.
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
    steps:
      - id: rp
        uses: googleapis/release-please-action@v4
        with:
          release-type: node

  # ── npm publish ─────────────────────────────────────────────────────────────
  # Runs only when Release Please just created a new GitHub Release.
  # Uses OIDC (Trusted Publisher) — no stored npm token needed.
  npm-publish:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-node@v4.4.0
        with:
          node-version: '22'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci

      - name: Debug OIDC environment
        run: |
          echo "ACTIONS_ID_TOKEN_REQUEST_URL set: $([[ -n "${ACTIONS_ID_TOKEN_REQUEST_URL}" ]] && echo yes || echo NO)"
          cat "${NPM_CONFIG_USERCONFIG}" | sed 's/=.*/=<redacted>/'

      # setup-node exports NODE_AUTH_TOKEN (= GITHUB_TOKEN) and writes a
      # .npmrc with _authToken=${NODE_AUTH_TOKEN}. Strip both so npm has
      # the registry endpoint configured but no pre-set auth token —
      # that causes it to fall through to the OIDC Trusted Publisher
      # exchange (triggered automatically when ACTIONS_ID_TOKEN_REQUEST_URL
      # is present and no other auth is configured).
      - name: Publish to npm via OIDC Trusted Publisher
        run: |
          sed -i '/_authToken/d' "${NPM_CONFIG_USERCONFIG}"
          unset NODE_AUTH_TOKEN
          npm publish --provenance --access public

  # ── GitHub Pages ────────────────────────────────────────────────────────────
  # Builds the example site and deploys it to GitHub Pages on every push to main.
  pages:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4.4.0
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Build example site
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          node bin/markdown-graph.js --build ./site --repos \
            vercel/next.js,facebook/react,vitejs/vite

      - uses: actions/configure-pages@v5.0.0
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3.0.1
        with:
          path: ./site

      - id: deployment
        uses: actions/deploy-pages@v4.0.5
