name: deploy

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # ── GitHub Pages ────────────────────────────────────────────────────────────
  pages:
    if: github.event_name != 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4.4.0
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Build example site
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          node bin/markdown-graph.js --build ./site --repos \
            vercel/next.js,facebook/react,vitejs/vite

      - uses: actions/configure-pages@v5.0.0
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3.0.1
        with:
          path: ./site

      - id: deployment
        uses: actions/deploy-pages@v4.0.5

  # ── npm publish (triggered by a GitHub Release created by Release Please) ──
  npm:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-node@v4.4.0
        with:
          node-version: '22'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci

      - run: npm publish --provenance --access public
